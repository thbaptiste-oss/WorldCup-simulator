<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Simulator 48</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b6623;
    color: white;
    text-align: center;
}

#scoreboard {
    background: black;
    padding: 10px;
    font-size: 20px;
    display: flex;
    justify-content: space-around;
    align-items: center;
}

#field {
    width: 90%;
    height: 400px;
    margin: 20px auto;
    background: #1e8f3a;
    border: 3px solid white;
    position: relative;
    overflow: hidden;
}

.player {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    position: absolute;
}

.teamA { background: blue; }
.teamB { background: red; }

#ball {
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    position: absolute;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
}
</style>
</head>

<body>

<div id="scoreboard">
<div>France 🇫🇷 <span id="scoreA">0</span></div>
<div id="time">00:00</div>
<div>Brésil 🇧🇷 <span id="scoreB">0</span></div>
</div>

<div id="field">
<div id="ball"></div>
</div>

<button onclick="startMatch()">▶ Lancer le match</button>

<script>
let scoreA = 0;
let scoreB = 0;
let time = 0;
let matchRunning = false;

const ball = document.getElementById("ball");
const field = document.getElementById("field");

function startMatch() {
    if (matchRunning) return;
    matchRunning = true;

    let interval = setInterval(() => {
        time++;

        document.getElementById("time").innerText =
            "00:" + (time < 10 ? "0" + time : time);

        // mouvement du ballon
        ball.style.left = Math.random() * 90 + "%";
        ball.style.top = Math.random() * 90 + "%";

        // chance de but
        let goalChance = Math.random();

        if (goalChance > 0.97) {
            if (Math.random() > 0.5) {
                scoreA++;
                document.getElementById("scoreA").innerText = scoreA;
                alert("⚽ BUT France !");
            } else {
                scoreB++;
                document.getElementById("scoreB").innerText = scoreB;
                alert("⚽ BUT Brésil !");
            }
        }

        // fin du match après 90 "secondes"
        if (time >= 90) {
            clearInterval(interval);
            matchRunning = false;
            alert("🏁 Match terminé !");
        }

    }, 500);
}
</script>

</body>
</html>
